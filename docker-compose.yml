# docker-compose.yml
# ───────────────────
# Fin-Guardian AI — Local Infrastructure
#
# This file starts ALL required services with one command:
#   docker-compose up -d
#
# Services started:
#   - Zookeeper  (Kafka needs this to run — think of it as Kafka's manager)
#   - Kafka      (message bus — receives HOLD events from the gateway)
#   - Redis      (feature store — pre-computed user features at ~1ms)
#   - Neo4j      (graph database — money laundering network detection)
#   - Kafka UI   (browser dashboard to see Kafka messages)
#
# To stop everything:
#   docker-compose down
#
# To see logs:
#   docker-compose logs -f kafka
#   docker-compose logs -f neo4j

services:

  # ── Zookeeper ────────────────────────────────────────────────────────────
  # Kafka's coordination service. You never interact with it directly.
  # It just needs to be running before Kafka starts.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fin_guardian_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOO_CFG_EXTRA: "metricsProvider.className=org.apache.zookeeper.metrics.prometheus.PrometheusMetricsProvider metricsProvider.httpPort=7070"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - fin_guardian_net

  # ── Kafka ─────────────────────────────────────────────────────────────────
  # The message bus. Gateway publishes HOLD events here.
  # Celery workers consume them for deep investigation.
  #
  # WHY Kafka instead of Redis Pub/Sub?
  # Kafka stores messages durably for 7 days.
  # If a worker crashes mid-investigation, it can replay the event.
  # Redis Pub/Sub loses messages permanently on crash.
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fin_guardian_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # internal (container-to-container)
      - "29092:29092"     # external (your Python code on Windows)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168      # keep messages for 7 days
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - fin_guardian_net

  # ── Kafka UI ──────────────────────────────────────────────────────────────
  # A browser dashboard to see Kafka topics and messages.
  # Open http://localhost:8080 after starting.
  # You'll see 'transactions.hold' topic fill up as fraud is detected.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fin_guardian_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: fin-guardian
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - fin_guardian_net

  # ── Redis ─────────────────────────────────────────────────────────────────
  # In-memory feature store.
  # Pre-computed user features (rolling averages, velocity scores) live here.
  # Hot path reads features in ~1ms instead of querying a database.
  #
  # Also used as Celery's task broker and result backend.
  redis:
    image: redis:7.2-alpine
    container_name: fin_guardian_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes    # persist data to disk
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fin_guardian_net

  # ── Neo4j ─────────────────────────────────────────────────────────────────
  # Graph database for money laundering network detection.
  # Every account = node, every transaction = edge.
  # Louvain algorithm finds tightly-connected fraud clusters.
  #
  # Browser UI: http://localhost:7474
  # Username: neo4j, Password: fingurdain123
  # Bolt connection: bolt://localhost:7687
  neo4j:
    image: neo4j:5.15-community
    container_name: fin_guardian_neo4j
    ports:
      - "7474:7474"     # browser UI
      - "7687:7687"     # bolt protocol (Python driver connects here)
    environment:
      NEO4J_AUTH: neo4j/fingurdain123
      NEO4J_PLUGINS: '["graph-data-science"]'    # GDS for Louvain algorithm
      NEO4J_dbms_security_procedures_unrestricted: gds.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - fin_guardian_net

# ── Volumes (persistent storage) ──────────────────────────────────────────
# Data survives docker-compose down / up cycles.
volumes:
  redis_data:
  neo4j_data:
  neo4j_logs:

# ── Network ───────────────────────────────────────────────────────────────
# All services talk to each other on this private network.
# From Python code on Windows, use localhost:PORT.
# From container-to-container, use service name:PORT (e.g. kafka:9092).
networks:
  fin_guardian_net:
    driver: bridge
